name: Lint and Test Python
on:
  # pull-request events are not triggered when a PR is merged
  # push events are not triggered when a PR created from a fork repository
  # So we need both to run tests on every PR and after merging
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    uses: kitsuyui/gh-actions-workflows/.github/workflows/actionlint.yml@a7071a4635eaece62696cd7132306616ce283c47
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        # # https://scientific-python.org/specs/spec-0000/
        python: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: install shared libraries
        run: |
          brew install openblas
          brew install lapack

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "${{ matrix.python }}"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Check generated artifacts
        run: ./bin/check-generated-artifacts

      - name: Install dependencies
        run: |
          uv python pin ${{ matrix.python }}
          uv sync

      - name: Lint
        run: uv run poe check

      - name: Check Python version
        run: |
          actual_version=$(uv run python --version)
          expected_version="Python ${{ matrix.python }}"
          if [[ "$actual_version" != *"$expected_version"* ]]; then
            echo "Expected $expected_version, but got $actual_version"
            exit 1
          fi

      - name: Test
        run: uv run poe test

      - name: Coverage
        run: uv run poe coverage
